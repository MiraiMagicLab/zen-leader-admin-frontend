name: Build and Deploy Admin

# Builds Vite admin SPA and deploys static files to VPS nginx root.
# DNS: admin.zenleader.xyz must be A ? VPS.
# Requires repo secrets: VPS_SSH_HOST, VPS_SSH_USER, VPS_SSH_KEY
# Optional: VPS_DEPLOY_PATH (default /home/dev/zen-leader), vars.VITE_API_URL

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: deploy-admin-production
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install & build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        run: |
          export VITE_API_URL="${VITE_API_URL:-https://api.omniadly.com}"
          echo "Building admin with VITE_API_URL=$VITE_API_URL"
          npm ci
          npm run build
          tar -czf admin-dist.tgz -C dist .

      - uses: actions/upload-artifact@v4
        with:
          name: admin-dist
          path: admin-dist.tgz
          retention-days: 7

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: admin-dist

      - name: Prepare upload directory on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_SSH_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            mkdir -p "$HOME/ci-uploads"
            rm -f "$HOME/ci-uploads/admin-dist.tgz"

      - name: Upload artifact to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_SSH_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: admin-dist.tgz
          target: ci-uploads
          overwrite: true

      - name: Extract on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_SSH_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            DEPLOY_PATH="${{ secrets.VPS_DEPLOY_PATH }}"
            if [ -z "$DEPLOY_PATH" ]; then
              DEPLOY_PATH="/home/dev/zen-leader"
            fi
            ARTIFACT="$HOME/ci-uploads/admin-dist.tgz"
            ls -la "$HOME/ci-uploads"
            test -f "$ARTIFACT"
            sudo "$DEPLOY_PATH/scripts/ci-deploy-admin.sh" "$ARTIFACT"
